<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Nithi💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay" id="startScreen">
  <h1>Tap to Open 💖</h1>
</div>

<div class="container">

  <div class="card main">
    <h1>Happy Birthday Nithi🎉</h1>
    <p class="subtitle">I made something special for you</p>
    <button onclick="showSurprise()">Open 🎁</button>
  </div>

<div class="card gallery-card">
    <h2>📸 Memories</h2>
    <div class="gallery">
      <img src="images/photo.jpeg">
      <img src="images/photo1.jpeg">
    </div>
    <div class="card">

  <div class="card hidden" id="messageCard">
    <h2>💌 For You</h2>
    <p id="typing"></p>
  </div>


  <h2>📮 Send a Secret Message</h2>

  <textarea id="userMessage" placeholder="Type something sweet... 💖"></textarea>

  <button onclick="showLetter()">Send 💌</button>

  <div id="letter" class="letter hidden"></div>
</div>
  </div>

</div>

<div id="hearts"></div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</body>
</html>
