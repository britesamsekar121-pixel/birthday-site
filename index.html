<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Nithi💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay" id="startScreen">
  <h1>Tap to Open 💖</h1>
</div>

<div class="container">

  <div class="card">
    <h1>Happy Birthday Nithi 🎉</h1>
    <p>I made something special for you</p>
    <button onclick="openGift()">Open 🎁</button>
  </div>

  <div class="card">
    <h2>📸 Memories</h2>
    <div class="gallery">
      <img src="images/photo.jpeg">
      <img src="images/photo1.jpeg">
    </div>
  </div>

  <!-- 👇 THIS MUST BE OUTSIDE -->
  <div class="card">
    <h2>💌 A Letter For You</h2>
    <button onclick="showLetter()">Open 💖</button>
    <div id="letter" class="letter hidden"></div>
  </div>

</div>
<div id="hearts"></div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</body>
</html>
